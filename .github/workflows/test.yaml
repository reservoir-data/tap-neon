name: Test tap-neon

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:
  schedule:
  - cron: "0 10 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  FORCE_COLOR: 1
  # renovate: datasource=pypi depName=prek
  PREK_VERSION: 0.4.1
  # renovate: datasource=pypi depName=tox
  TOX_VERSION: 4.54.0
  # renovate: datasource=pypi depName=tox-uv
  TOX_UV_VERSION: 1.35.2
  # renovate: datasource=pypi depName=uv
  UV_VERSION: 0.11.16

jobs:
  files-changed:
    runs-on: ubuntu-24.04
    name: Detect file changes
    outputs:
      runtime: ${{ steps.changes.outputs.runtime }}
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
      id: changes
      with:
        filters: |
          runtime:
            - 'tap_neon/**'
            - 'tests/**'
            - 'pyproject.toml'
            - 'uv.lock'
            - '.github/workflows/test.yml'

  build-package:
    name: Build & verify package
    runs-on: ubuntu-latest
    outputs:
      supported-python-versions: ${{ steps.baipp.outputs.supported_python_classifiers_json_array }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: hynek/build-and-inspect-python-package@d44ca7d91762de7a7d5436ddae667c6da6d1c3df # v2.18.0
        id: baipp

  tests:
    name: Test
    runs-on: ubuntu-24.04
    needs: build-package
    strategy:
      max-parallel: 2
      matrix:
        python-version: ${{ fromJson(needs.build-package.outputs.supported-python-versions) }}

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        python-version: ${{ matrix.python-version }}
        version: ${{ env.UV_VERSION }}
    - name: Run
      env:
        TAP_NEON_API_KEY: ${{ secrets.TAP_NEON_API_KEY }}
        MATRIX_PYTHON_VERSION: ${{ matrix.python-version }}
      run: >
        uvx
        --with tox-uv=="${TOX_UV_VERSION}"
        --with tox=="${TOX_VERSION}"
        tox -e "${MATRIX_PYTHON_VERSION}"

  static:
    name: Static Analysis
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        version: ${{ env.UV_VERSION }}
    - name: Install tools
      run: >
        uv tool install
        --managed-python
        --with tox-uv=="${TOX_UV_VERSION}"
        --with tox=="${TOX_VERSION}"
        tox
    - name: Static Analysis
      run: tox -m check

  pre-commit:
    name: pre-commit hooks
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        version: ${{ env.UV_VERSION }}
    - run: >
        uvx
        --with prek=="${PREK_VERSION}"
        prek run --show-diff-on-failure --all-files
