name: Test tap-neon

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  schedule:
  - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  FORCE_COLOR: "1"
  # renovate: datasource=pypi depName=prek
  PREK_VERSION: 0.3.8
  # renovate: datasource=pypi depName=tox
  TOX_VERSION: 4.46.3
  # renovate: datasource=pypi depName=tox-uv
  TOX_UV_VERSION: 1.33.0
  # renovate: datasource=pypi depName=uv
  UV_VERSION: 0.10.7

jobs:
  files-changed:
    runs-on: ubuntu-24.04
    name: Detect file changes
    outputs:
      runtime: ${{ steps.changes.outputs.runtime }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
      id: changes
      with:
        filters: |
          runtime:
            - 'tap_neon/**'
            - 'tests/**'
            - 'pyproject.toml'
            - 'uv.lock'
            - '.github/workflows/test.yml'

  build-package:
    name: Build & verify package
    runs-on: ubuntu-latest
    outputs:
      supported-python-versions: ${{ steps.baipp.outputs.supported_python_classifiers_json_array }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: hynek/build-and-inspect-python-package@efb823f52190ad02594531168b7a2d5790e66516 # v2.14.0
        id: baipp

  tests:
    name: Test
    runs-on: ubuntu-24.04
    needs: build-package
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        python-version: ${{ fromJson(needs.build-package.outputs.supported-python-versions) }}

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        persist-credentials: false
    - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
      with:
        python-version: ${{ matrix.python-version }}
        version: ${{ env.UV_VERSION }}
    - name: Run
      env:
        TAP_NEON_API_KEY: ${{ secrets.TAP_NEON_API_KEY }}
        MATRIX_PYTHON_VERSION: ${{ matrix.python-version }}
      run: >
          uvx
          --with tox-uv==${TOX_UV_VERSION}
          --with tox==${TOX_VERSION}
          tox -e ${MATRIX_PYTHON_VERSION}

  static:
    runs-on: ubuntu-24.04
    name: Static Analysis
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        persist-credentials: false
    - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
      with:
        version: ${{ env.UV_VERSION }}
    - name: Install tools
      run: >
          uv tool install
          --managed-python
          --with tox-uv==${TOX_UV_VERSION}
          --with tox==${TOX_VERSION}
          tox
    - name: Static Analysis
      run: tox -m check

  pre-commit:
    runs-on: ubuntu-24.04
    name: pre-commit hooks
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Install the latest version of uv
      uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
      with:
        version: ${{ env.UV_VERSION }}

    - run: >
        uvx
        --with prek==${PREK_VERSION}
        prek run --show-diff-on-failure --all-files
